name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        default: "release"
        required: true
        type: choice
        options: [debug, release]

concurrency:
  group: build-apk-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        id: keystore
        if: inputs.build_type == 'release'
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "⚠️  KEYSTORE_BASE64 not set — using debug signing"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "$KEYSTORE_BASE64" | base64 -d > app/release.jks
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_FILE: app/release.jks
        run: |
          if [ "${{ inputs.build_type }}" = "release" ] && \
             [ -f "$STORE_FILE" ] && \
             [ -n "$KEYSTORE_PASSWORD" ] && \
             [ -n "$KEY_ALIAS" ] && \
             [ -n "$KEY_PASSWORD" ]; then
            echo "🔑 Signing with release keystore"
            ./gradlew assembleRelease
          else
            if [ "${{ inputs.build_type }}" = "release" ]; then
              echo "⚠️  Missing keystore/secrets — falling back to debug signing"
            fi
            ./gradlew assembleDebug
          fi

      - name: Locate APK
        id: apk
        shell: bash
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ No APK found!"
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$APK")" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Looma-${{ inputs.build_type }}-${{ github.sha }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
